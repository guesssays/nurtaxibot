<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WB Taxi Bot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      main {
        max-width: 640px;
        padding: 32px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      code {
        font-family: Consolas, monospace;
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WB Taxi Registration Bot</h1>
      <p>
        Backend is running on Netlify Functions.
        Use <code>/.netlify/functions/healthcheck</code> for service verification.
      </p>
    </main>
  </body>
</html>
